name: Publish Docker image to GHCR

# Manual-only trigger. Go to the Actions tab and click "Run workflow"
# to build and push. Mirrors the old laptop-side buildx flow but the
# image lands in ghcr.io instead of a local tarball, so the server pulls
# incremental layers over the wire.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jtrail
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA layer cache — first run is ~8 min, subsequent runs ~2 min
          # because node_modules install layer is reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max
